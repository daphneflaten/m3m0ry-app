<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>m3m0ry</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Reddit+Mono:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="scent.css">
</head>
<body>

  <div class="page" id="page">

    <div class="top-text">
      <p class="system-line">scent released</p>
      <p class="instruction">select the emotion you feel</p>
    </div>

    <div class="picker-container">
      <div class="center-indicator"></div>
      <div class="picker-mask"></div>
      <div class="picker" id="picker"></div>
    </div>

    <p class="emotion-definition" id="emotionDefinition"></p>

    <div class="confirm-section">
      <button id="confirmBtn" disabled>confirm emotion</button>
    </div>

    <div class="reflection-section" id="reflectionSection">
      <p class="memory-prompt">describe what surfaced.</p>
      <textarea id="reflectionInput" placeholder="type here..."></textarea>

      <label>intensity</label>
      <input type="range" id="intensity" min="1" max="10">

      <button id="lockInBtn">lock in</button>
    </div>

  </div>

  <!-- Diffusion intro overlay -->
  <div class="diffusion-overlay" id="diffusionOverlay"></div>

  <!-- Emotion bleed overlay -->
  <div class="pixel-overlay" id="pixelOverlay"></div>

  <script src="scent.js"></script>
</body>
</html>
