<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>m3m0ry</title>

    <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Reddit+Mono:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="homescreen.css" />
</head>
<body class="page-fade">
  <video class="bg-video" autoplay muted loop playsinline>
  <source src="type-graphic.mp4" type="video/mp4">
</video>
<div class="screen landing active">
<img src="logo.gif" alt="m3m0ry logo" class="logo">
  <button class="begin-btn" onclick="startCalibration()">
    begin emotional calibration
  </button>
</div>

<div class="screen onboarding" onclick="nextSlide()">
  <div class="slide active-slide">
    <p>
      memory degrades
    </p>
  </div>

  <div class="slide">
    <p>
      scent has a strange way of bringing things back
    </p>
  </div>

  <div class="slide">
    <p>
      your emotional baseline will be measured
    </p>
  </div>

  <div class="slide final-slide">
    <p>
      plug in your scent device
    </p>

    <button class="release-btn" onclick="releaseScent(event)">
      start
    </button>
  </div>
</div>


<script src="homescreen.js"></script>

</body>
</html>
